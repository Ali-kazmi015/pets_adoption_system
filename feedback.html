<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">
         <img src="colorful_logo.png" alt="Cat Logo">
        <span>Pet Welfare</span>
      </div>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="adopt.html">View & Adopt Pets</a></li>
        <li><a href="surrender.html">Surrender</a></li>
        <li><a href="lost-found.html">Lost & Found</a></li>
        <li><a href="profile.php">Profile</a></li>
        <li><a href="feedback.html" class="active">Feedback</a></li>
        <li><a href="donation.html">Donate</a></li>
        <li><a href="logout.php">Logout</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="form-section">
      <h2>Share Your Feedback</h2>
      <form action="feedback.php" method="POST">
        <!-- CSRF Token -->
        <input type="hidden" name="csrf_token" id="csrf_token">
        
        <input type="text" name="name" placeholder="Your name" maxlength="100" required>
        <input type="email" name="email" placeholder="Your email" required>
        <textarea name="comments" placeholder="Your comments (minimum 10 characters)" minlength="10" maxlength="2000" required></textarea>
        <button type="submit">Submit Feedback</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Pet Welfare & Adoption Centre</p>
  </footer>
  <script>
    async function loadCSRFToken() {
      try {
        const response = await fetch('get_csrf_token.php');
        const data = await response.json();
        document.getElementById('csrf_token').value = data.csrf_token;
      } catch (error) {
        console.error('Failed to load CSRF token:', error);
      }
    }

    // Call this when page loads
    loadCSRFToken();
  </script>
</body>
</html>
